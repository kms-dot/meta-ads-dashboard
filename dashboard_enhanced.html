<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta 광고 레퍼런스 대시보드</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #667eea;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .refresh-info {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f4ff;
            border-radius: 10px;
            color: #667eea;
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card .icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stat-card .label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
        }

        .category-section {
            margin-bottom: 40px;
            background: #f8f9ff;
            padding: 25px;
            border-radius: 15px;
        }

        .category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }

        .category-header h2 {
            color: #667eea;
            font-size: 1.8em;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            background: #667eea;
            color: white;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .ad-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .ad-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .ad-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }

        .ad-card.top-performer {
            border: 3px solid #28a745;
        }

        .ad-thumbnail {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .ad-content {
            padding: 15px;
        }

        .ad-advertiser {
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .ad-text {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
            line-height: 1.4;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ad-stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .ad-stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85em;
            color: #666;
        }

        .ad-stat-item .icon {
            font-size: 1em;
        }

        .ad-stat-item.highlight {
            color: #28a745;
            font-weight: bold;
        }

        .top-performer-badge {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .ad-link-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .ad-link-btn:hover {
            background: #764ba2;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #667eea;
            font-size: 1.2em;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border: 2px solid #f5c6cb;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        .sort-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }

        .sort-label {
            font-weight: bold;
            color: #667eea;
        }

        .sort-select {
            padding: 8px 12px;
            border: 2px solid #667eea;
            border-radius: 8px;
            background: white;
            color: #667eea;
            font-weight: bold;
            cursor: pointer;
        }

        .ad-count {
            color: #667eea;
            font-weight: bold;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Meta 광고 레퍼런스 대시보드</h1>
            <div class="subtitle">성과형 광고 분석 - 장기 게재 & 고성과 광고</div>
        </div>

        <div class="refresh-info">
            🔄 5초마다 자동 새로고침 | 마지막 업데이트: <span id="lastUpdate">-</span>
        </div>

        <div id="dashboard-content">
            <div class="loading">
                <div class="spinner"></div>
                <p>데이터를 불러오는 중...</p>
            </div>
        </div>
    </div>

    <script>
        let refreshInterval;
        let allAdsData = {};

        async function loadDashboard() {
            try {
                const response = await fetch('meta_output/meta_all_categories_20260211_190018.json');

                if (!response.ok) {
                    throw new Error('데이터 파일을 찾을 수 없습니다.');
                }

                const data = await response.json();
                allAdsData = data;
                renderDashboard(data);

                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('ko-KR');
            } catch (error) {
                document.getElementById('dashboard-content').innerHTML = `
                    <div class="error">
                        <h3>⚠️ 데이터를 불러올 수 없습니다</h3>
                        <p>${error.message}</p>
                        <p>크롤링 결과 파일: <code>meta_output/meta_all_categories_*.json</code></p>
                    </div>
                `;
            }
        }

        function renderDashboard(data) {
            const results = data.results;
            const categories = Object.keys(results);

            let totalAds = 0;
            let totalAdvertisers = 0;
            let totalTopPerformers = 0;

            categories.forEach(cat => {
                totalAds += results[cat].total_ads;
                const analysis = results[cat].overall_analysis || {};
                const summary = analysis.summary || {};
                totalAdvertisers += summary.unique_advertisers || 0;
            });

            let html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="icon">🎯</div>
                        <div class="label">총 광고 레퍼런스</div>
                        <div class="value">${totalAds.toLocaleString()}개</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon">📁</div>
                        <div class="label">카테고리 수</div>
                        <div class="value">${categories.length}개</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon">👥</div>
                        <div class="label">고유 광고주</div>
                        <div class="value">${totalAdvertisers.toLocaleString()}개</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon">⭐</div>
                        <div class="label">장기 게재 광고</div>
                        <div class="value" id="topPerformersCount">계산중...</div>
                    </div>
                </div>
            `;

            categories.forEach(catName => {
                const catData = results[catName];
                const resultsByQuery = catData.results_by_query || {};

                // 모든 광고 수집
                let allAds = [];
                Object.values(resultsByQuery).forEach(queryResult => {
                    if (queryResult.ads) {
                        allAds = allAds.concat(queryResult.ads);
                    }
                });

                // 성과 기준 필터링: 게재 기간 30일 이상, 노출수 적음 제외
                const topPerformers = allAds.filter(ad => {
                    const daysLive = ad.days_live || 0;
                    const impressionText = ad.impression_text || '';
                    const isLowImpression = impressionText.includes('적음') || impressionText.toLowerCase().includes('low');
                    return daysLive >= 30 && !isLowImpression;
                });

                // 게재 기간순 정렬
                topPerformers.sort((a, b) => (b.days_live || 0) - (a.days_live || 0));

                totalTopPerformers += topPerformers.length;

                html += `
                    <div class="category-section" id="cat-${catName}">
                        <div class="category-header">
                            <h2>📊 ${catName}</h2>
                            <div class="filter-buttons">
                                <button class="filter-btn active" onclick="filterAds('${catName}', 'top')">
                                    ⭐ 장기 게재 (${topPerformers.length}개)
                                </button>
                                <button class="filter-btn" onclick="filterAds('${catName}', 'all')">
                                    📋 전체 (${allAds.length}개)
                                </button>
                            </div>
                        </div>

                        <div class="sort-controls">
                            <span class="sort-label">정렬:</span>
                            <select class="sort-select" onchange="sortAds('${catName}', this.value)">
                                <option value="days_desc">게재 기간 ↓</option>
                                <option value="days_asc">게재 기간 ↑</option>
                                <option value="recent">최근 게재일</option>
                            </select>
                            <span class="ad-count" id="count-${catName}">${topPerformers.length}개 광고</span>
                        </div>

                        <div class="ad-grid" id="grid-${catName}">
                            ${renderAdCards(topPerformers.slice(0, 20), true)}
                        </div>
                    </div>
                `;

                // 데이터 저장
                window[`allAds_${catName}`] = allAds;
                window[`topAds_${catName}`] = topPerformers;
                window[`currentAds_${catName}`] = topPerformers.slice(0, 20);
            });

            document.getElementById('dashboard-content').innerHTML = html;
            document.getElementById('topPerformersCount').textContent = totalTopPerformers.toLocaleString() + '개';
        }

        function renderAdCards(ads, isTopPerformer = false) {
            if (!ads || ads.length === 0) {
                return '<p style="padding: 20px; text-align: center; color: #666;">광고가 없습니다.</p>';
            }

            return ads.map(ad => {
                const advertiser = ad.advertiser || '광고주 정보 없음';
                const adText = ad.ad_text || '광고 내용 없음';
                const daysLive = ad.days_live || 0;
                const thumbnailUrl = ad.thumbnail_url || ad.ad_creative_image_url || '';
                const adLibraryUrl = ad.ad_library_url || '#';
                const impressionText = ad.impression_text || '정보 없음';
                const startDate = ad.start_date || '알 수 없음';
                const platforms = ad.platforms || [];

                const isLongRunning = daysLive >= 60;

                return `
                    <div class="ad-card ${isLongRunning ? 'top-performer' : ''}" onclick="window.open('${adLibraryUrl}', '_blank')">
                        ${isLongRunning ? '<div class="top-performer-badge">🏆 장기 게재 (60일+)</div>' : ''}
                        ${thumbnailUrl ? `<img class="ad-thumbnail" src="${thumbnailUrl}" alt="광고 이미지" onerror="this.style.display='none'">` : '<div class="ad-thumbnail" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 3em;">📊</div>'}
                        <div class="ad-content">
                            <div class="ad-advertiser">${advertiser}</div>
                            <div class="ad-text">${adText.substring(0, 100)}${adText.length > 100 ? '...' : ''}</div>
                            <div class="ad-stats">
                                <div class="ad-stat-item ${daysLive >= 60 ? 'highlight' : ''}">
                                    <span class="icon">📅</span>
                                    <span>${daysLive}일 게재</span>
                                </div>
                                <div class="ad-stat-item">
                                    <span class="icon">👁️</span>
                                    <span>${impressionText}</span>
                                </div>
                                <div class="ad-stat-item">
                                    <span class="icon">🗓️</span>
                                    <span>${startDate}</span>
                                </div>
                            </div>
                            ${platforms.length > 0 ? `<div class="ad-stat-item"><span class="icon">📱</span><span>${platforms.join(', ')}</span></div>` : ''}
                            <a href="${adLibraryUrl}" class="ad-link-btn" target="_blank" onclick="event.stopPropagation()">
                                광고 라이브러리에서 보기 →
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterAds(category, filter) {
            const buttons = document.querySelectorAll(`#cat-${category} .filter-btn`);
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            let ads;
            if (filter === 'top') {
                ads = window[`topAds_${category}`];
            } else {
                ads = window[`allAds_${category}`];
            }

            window[`currentAds_${category}`] = ads;
            document.getElementById(`grid-${category}`).innerHTML = renderAdCards(ads.slice(0, 20));
            document.getElementById(`count-${category}`).textContent = ads.length + '개 광고';
        }

        function sortAds(category, sortType) {
            let ads = [...window[`currentAds_${category}`]];

            if (sortType === 'days_desc') {
                ads.sort((a, b) => (b.days_live || 0) - (a.days_live || 0));
            } else if (sortType === 'days_asc') {
                ads.sort((a, b) => (a.days_live || 0) - (b.days_live || 0));
            } else if (sortType === 'recent') {
                ads.sort((a, b) => {
                    const dateA = new Date(a.start_date || 0);
                    const dateB = new Date(b.start_date || 0);
                    return dateB - dateA;
                });
            }

            window[`currentAds_${category}`] = ads;
            document.getElementById(`grid-${category}`).innerHTML = renderAdCards(ads.slice(0, 20));
        }

        // 초기 로드
        loadDashboard();

        // 5초마다 자동 새로고침
        refreshInterval = setInterval(loadDashboard, 5000);
    </script>
</body>
</html>
