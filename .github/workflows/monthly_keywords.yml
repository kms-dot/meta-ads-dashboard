name: Monthly Keyword Update

# 실행 트리거
on:
  # 매월 1일 오전 9시 (KST) 실행 = UTC 0:00
  schedule:
    - cron: '0 0 1 * *'

  # 수동 실행 가능
  workflow_dispatch:
    inputs:
      categories:
        description: '업데이트할 카테고리 (쉼표로 구분, 비워두면 전체)'
        required: false
        type: string
      top_brands_count:
        description: '추출할 상위 브랜드 수'
        required: false
        default: '50'
        type: string

jobs:
  update-keywords:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 최대 2시간

    steps:
    # 1. 코드 체크아웃
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Python 환경 설정
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 3. 의존성 설치
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Chrome 및 ChromeDriver 설치
    - name: Install Chrome and ChromeDriver
      run: |
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    # 5. 가상 디스플레이 설정
    - name: Set up virtual display
      run: |
        sudo apt-get install -y xvfb
        Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
        echo "DISPLAY=:99" >> $GITHUB_ENV

    # 6. 출력 디렉토리 생성
    - name: Create output directories
      run: |
        mkdir -p output
        mkdir -p logs

    # 7. 쇼핑몰에서 키워드 수집 (브랜드 추출)
    - name: Crawl e-commerce for brand keywords
      env:
        DISPLAY: :99
      run: |
        echo "Crawling e-commerce platforms for brand keywords..."
        python update_keywords.py

    # 8. 수집된 키워드를 DB에 저장
    - name: Update keywords in database
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        echo "Updating keywords in Supabase..."
        python -c "
        from database import KeywordRepository
        import json

        # 수집된 키워드 로드
        with open('output/extracted_brands.json', 'r', encoding='utf-8') as f:
            data = json.load(f)

        keyword_repo = KeywordRepository()

        for category, brands in data.items():
            print(f'Updating {category}: {len(brands)} brands')

            keywords_dict = {
                'product_types': [],
                'brands': brands,
                'functions': []
            }

            stats = keyword_repo.save_keywords_batch(
                category=category,
                keywords_dict=keywords_dict,
                source='ecommerce_crawl'
            )

            print(f'{category}: {stats[\"inserted\"]} keywords saved')
        "

    # 9. 키워드 통계 생성
    - name: Generate keyword statistics
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python -c "
        from database import KeywordRepository

        keyword_repo = KeywordRepository()

        # 카테고리별 키워드 수 조회
        categories = ['뷰티디바이스', '스킨케어', '헤어케어', '생활용품', '건강기능식품']

        print('Keyword Statistics:')
        print('=' * 50)

        for category in categories:
            keywords = keyword_repo.get_keywords_by_category(category)

            total = (
                len(keywords.get('product_types', [])) +
                len(keywords.get('brands', [])) +
                len(keywords.get('functions', []))
            )

            print(f'{category}:')
            print(f'  - Product Types: {len(keywords.get(\"product_types\", []))}')
            print(f'  - Brands: {len(keywords.get(\"brands\", []))}')
            print(f'  - Functions: {len(keywords.get(\"functions\", []))}')
            print(f'  - Total: {total}')
            print()
        "

    # 10. 결과 업로드
    - name: Upload keyword update results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: keyword-update-${{ github.run_number }}
        path: |
          output/*.json
          logs/*.log
        retention-days: 90  # 90일간 보관

    # 11. 성공 알림
    - name: Notify on success
      if: success()
      run: |
        echo "✅ Keyword update completed successfully!"

    # 12. 실패 알림
    - name: Notify on failure
      if: failure()
      run: |
        echo "❌ Keyword update failed!"

  # 브랜드 통계 갱신
  refresh-brand-stats:
    runs-on: ubuntu-latest
    needs: update-keywords  # 키워드 업데이트 완료 후 실행
    if: success()

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Refresh brand statistics
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        echo "Refreshing brand statistics in database..."
        python -c "
        from database import get_supabase_client

        client = get_supabase_client()

        # SQL 함수 실행
        result = client.rpc('refresh_brand_stats').execute()

        print('Brand statistics refreshed successfully!')
        "
