name: Monthly Brand Update

on:
  schedule:
    # 매월 1일 오전 9시 (KST 기준)
    - cron: '0 0 1 * *'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  update-brands:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run brand collector
        run: |
          python ecommerce_brand_collector.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet config/categories.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add config/categories.json
          git commit -m "chore: 월간 브랜드 자동 업데이트 $(date +'%Y-%m-%d')"
          git push

      - name: Create summary
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          echo "## 브랜드 업데이트 완료 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "자동 수집된 브랜드가 config/categories.json에 추가되었습니다." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**업데이트 날짜**: $(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
