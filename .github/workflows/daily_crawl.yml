name: Daily Meta Ads Crawling

# 실행 트리거
on:
  # 매일 오전 12시 (KST) 실행 = UTC 15:00
  schedule:
    - cron: '0 15 * * *'

  # 수동 실행 가능
  workflow_dispatch:
    inputs:
      category:
        description: '크롤링할 카테고리 (비워두면 전체)'
        required: false
        type: string
      max_ads:
        description: '수집할 최대 광고 수'
        required: false
        default: '100'
        type: string

jobs:
  crawl-meta-ads:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 최대 1시간

    steps:
    # 1. 코드 체크아웃
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Python 환경 설정
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'  # pip 캐시 활성화

    # 3. 의존성 설치
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Chrome 및 ChromeDriver 설치
    - name: Install Chrome and ChromeDriver
      run: |
        # Chrome 저장소 추가
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'

        # 패키지 업데이트 및 설치
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

        # ChromeDriver 설치 (webdriver-manager가 자동으로 처리하므로 생략 가능)
        # sudo apt-get install -y chromium-chromedriver

    # 5. 디스플레이 설정 (헤드리스 모드용)
    - name: Set up virtual display
      run: |
        sudo apt-get install -y xvfb
        Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
        echo "DISPLAY=:99" >> $GITHUB_ENV

    # 6. 출력 디렉토리 생성
    - name: Create output directories
      run: |
        mkdir -p meta_output
        mkdir -p logs

    # 7. Meta 광고 크롤링 실행
    - name: Run Meta Ads Crawler
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        LOG_LEVEL: INFO
        DISPLAY: :99
      run: |
        echo "Starting Meta ads crawling..."
        python main_meta_db.py

    # 8. 크롤링 결과 업로드 (실패 시에도 실행)
    - name: Upload crawling results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: crawl-results-${{ github.run_number }}
        path: |
          meta_output/*.json
          meta_output/*.log
        retention-days: 30  # 30일간 보관

    # 9. 크롤링 통계 출력
    - name: Print crawling statistics
      if: success()
      run: |
        echo "Crawling completed successfully!"
        echo "Check artifacts for detailed results."

    # 10. 실패 알림 (선택사항)
    - name: Notify on failure
      if: failure()
      run: |
        echo "❌ Crawling failed!"
        echo "Check the logs for details."
        # Slack/Discord 웹훅 추가 가능
        # curl -X POST -H 'Content-type: application/json' \
        #   --data '{"text":"Meta ads crawling failed!"}' \
        #   ${{ secrets.SLACK_WEBHOOK_URL }}

    # 11. 성공 알림 (선택사항)
    - name: Notify on success
      if: success()
      run: |
        echo "✅ Crawling completed successfully!"
        # Slack/Discord 웹훅 추가 가능

  # 오래된 광고 정리 작업
  cleanup-old-ads:
    runs-on: ubuntu-latest
    needs: crawl-meta-ads  # 크롤링 완료 후 실행
    if: success()  # 크롤링 성공 시에만 실행

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Deactivate old ads (90+ days)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python -c "
        from database import AdRepository
        ad_repo = AdRepository()
        count = ad_repo.deactivate_old_ads(days_threshold=90)
        print(f'Deactivated {count} ads older than 90 days')
        "
